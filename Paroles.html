const LABEL_RE = /^(Couplet|Refrain|Pré-?refrain|Pont|Outro|Final|Intro|Climax|Chorus|Pré-?chorus)\b/i;
const slug = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

function renderStanza(block){
  const lines = block.split('\n').filter(l=>l.trim()!=='');
  if(!lines.length) return '';
  let html='', isRefrain=false, body='';
  lines.forEach((ln,idx)=>{
    const t=ln.trim();
    if(idx===0 && LABEL_RE.test(t)){
      if(/^refrain/i.test(t)) isRefrain=true;
      html+=`<div class="label">${t}</div>`;
    } else if(/^\[.*\]$/.test(t)){
      body+=`<div class="note">${t.replace(/^\[|\]$/g,'')}</div>`;
    } else {
      body+=`<div class="line">${t}</div>`;
    }
  });
  return `<div class="stanza${isRefrain?' refrain':''}">${html}${body}</div>`;
}

const songsEl=document.getElementById('songs');
const tocEl=document.getElementById('toc');
SONGS.forEach(s=>{
  const id=slug(s.t);
  tocEl.insertAdjacentHTML('beforeend',`<a href="#${id}">${String(s.n).padStart(2,'0')} · ${s.t}</a>`);
  let inner;
  if(s.pending){
    inner=`<p class="pending">Les paroles de ce titre seront ajoutées prochainement.</p>`;
  } else {
    inner=s.lyrics.split(/\n\s*\n/).map(renderStanza).join('');
  }
  songsEl.insertAdjacentHTML('beforeend',
    `<section class="song" id="${id}">
      <div class="song-head">
        <span class="song-num">${String(s.n).padStart(2,'0')}</span>
        <h2 class="song-title">${s.t}</h2>
      </div>
      ${inner}
    </section>`);
});
